<div class="collection-container">
  <div class="collection-content">
    <div class="icon-container">
      <lucide-icon color="#3bbfad" name="graduation-cap"></lucide-icon>
    </div>
    <h2>Your collection</h2>

    @if (stats) {
      <p class="subtitle">{{ stats.total }} expressions to review</p>
      <div class="collection-cards">
        <div class="new">
          <span class="label">New</span>
          <span class="value">{{ stats.new }}</span>
        </div>
        <div class="learning">
          <span class="label">Learning</span>
          <span class="value">{{ stats.learning }}</span>
        </div>
        <div class="mastered">
          <span class="label">Mastered</span>
          <span class="value">{{ stats.mastered }}</span>
        </div>
      </div>
    } @else {
      <p class="subtitle">Chargement...</p>
    }

    <button (click)="onFlashcards()" class="collection-button">Start review</button>
  </div>
</div>
