<div class="form-section">
  <h2>Add New expression or Word</h2>
  <form [formGroup]="vocabularyForm" class="vocabulary-form">
    <div class="form-group">
      <label for="expression">The expression/word</label>
      <input
        type="text"
        id="expression"
        name="expression"
        formControlName="expression"
        placeholder="e.g. To call off"
        required
      />
    </div>

    <div class="second-form-group">
      <label for="sentence">Your Sentence</label>
      <input
        type="text"
        id="sentence"
        name="sentence"
        formControlName="contextSentence"
        placeholder="Write a sentence using this expression"
        required
      />
    </div>

    <button class="button-form" type="submit">Save to my Linguo !</button>
  </form>
</div>
