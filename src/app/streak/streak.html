<div class="streak-container">
  <span class="streak-icon">{{ streakEmoji }}</span>
  <div class="streak-content">
    <span class="streak-label">Streak: {{ streakCount }} {{ streakCount <= 1 ? 'day' : 'days' }}!</span>
    <div class="streak-bar-wrap">
      <div class="streak-bar-fill" [style.width.%]="progressPercent"></div>
    </div>
    <div class="streak-days">
      @for (day of streakDays; track day.index) {
        <div class="streak-day" [class.done]="day.done"></div>
      }
    </div>
  </div>
  <span class="streak-goal">{{ streakCount }}/{{ nextMilestone }}</span>
</div>
